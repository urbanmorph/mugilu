name: Refresh gazetteer

# Rebuild the place gazetteer from OpenStreetMap and upload it to R2. Runs monthly
# (place names change slowly) and on demand. This is a DATA refresh: it never touches
# the worker code or triggers a deploy, so coverage and spellings improve with no code
# release. The worker picks up the new file on its next isolate load.
on:
  schedule:
    - cron: "0 3 1 * *" # 03:00 UTC on the 1st of each month
  workflow_dispatch: {}

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build gazetteer from OSM
        run: python3 scripts/build_gazetteer.py

      # Node + the workspace's pinned wrangler (4.x), so the upload uses the same
      # wrangler as the deploy job. Without an install, wrangler-action can't find
      # the project's wrangler and falls back to an old default (3.x) that rejects
      # `r2 object put --remote` ("Unknown argument: remote").
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      - name: Upload to R2
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          workingDirectory: apps/worker
          command: r2 object put oaq-data/data/gazetteer.json --file ../../gazetteer.json --remote
