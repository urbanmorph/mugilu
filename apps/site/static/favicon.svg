<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="mugilu">
  <!-- mugilu favicon — white cloud on a sky-blue rounded square.
       Sky-600 (#0284c7) is the brand accent (vs bharatlas indigo, mdshare dark).
       Cloud drawn from primitives so it renders identically without fonts and
       stays legible at 16x16. The cloud is also the mascot's resting face. -->
  <rect width="64" height="64" rx="14" fill="#0284c7"/>
  <g fill="#ffffff">
    <rect x="14" y="35" width="36" height="13" rx="6.5"/>
    <circle cx="24" cy="33" r="9"/>
    <circle cx="37" cy="30" r="11"/>
    <circle cx="46" cy="37" r="6.5"/>
  </g>
</svg>
