name: CI/CD

# test runs on every PR and every push to main (the merge gate).
# deploy runs ONLY on a push to main, and ONLY after test passes.
# The `production` environment lets you add a required reviewer in
# repo Settings > Environments so deploys pause for manual approval
# (CI-green + PR review then replace the old "verify on localhost first" step).
on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/worker
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Install
        run: pnpm install --frozen-lockfile
        working-directory: .
      - name: Typecheck
        run: pnpm typecheck
      - name: Test
        run: pnpm test
      - name: Format check
        run: pnpm dlx prettier@3 --check "src/**/*.ts" "test/**/*.ts"

  deploy:
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Deploy worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          workingDirectory: apps/worker
