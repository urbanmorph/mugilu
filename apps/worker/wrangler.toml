name = "mugilu-worker"
main = "src/index.ts"
compatibility_date = "2026-01-01"
account_id = "6ba72cdd965276a57d19bf0aadc4d551"

# Custom domains. Requires mugilu.live to be a zone in this Cloudflare account.
# www is attached too so the worker can 301 it to the apex (see index.ts).
routes = [
  { pattern = "mugilu.live", custom_domain = true },
  { pattern = "www.mugilu.live", custom_domain = true },
]

# Crons (UTC): ":05 hourly" = air refresh + SACHET warnings poll;
# ":05 every 4h" = national conditions grid (fits Open-Meteo's free quota);
# "20:30 daily" (02:00 IST) = provider hierarchy refresh.
[triggers]
crons = ["5 * * * *", "5 */4 * * *", "30 20 * * *"]

[[kv_namespaces]]
binding = "OAQ_KV"
id = "2279644a57474d1ebabcc94d09137c5c"

[[r2_buckets]]
binding = "OAQ_R2"
bucket_name = "oaq-data"

# First-party, aggregate usage counters (no IP, no per-user data). Powers the
# home's "Popular" from real top-lookups and the /api/counts read endpoint.
[[d1_databases]]
binding = "METRICS"
database_name = "mugilu_metrics"
database_id = "fac62f6c-2641-4ba1-a1d1-39494ce5dee7"

[vars]
OAQ_BROKER_URL = "https://us-central1-oaqdms.cloudfunctions.net/brokerData"
OAQ_BASE_URL = "https://oaq.notf.in/v1"
